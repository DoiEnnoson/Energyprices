name: Weekly Energy Newsletter

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Pipeline ausführen
        run: python run.py
        env:
          GMAIL_CONFIG:          ${{ secrets.GMAIL_CONFIG }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          TANKERKOENIG_API_KEY:  ${{ secrets.TANKERKOENIG_API_KEY }}

      - name: Daten committen
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "data: weekly update $(date -u +%Y-%m-%d)"
          git push
